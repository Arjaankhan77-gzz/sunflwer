<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facial + Hand Landmark Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#FFD700">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
  }

  #container {
    position: relative;
    width: 800px;
    max-width: 100vw;
    aspect-ratio: 800 / 600;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
  }

  /* Mirror the whole view, just like frame = cv2.flip in a typical webcam app */
  #canvasWrap {
    transform: scaleX(-1);
    width: 100%;
    height: 100%;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  video {
    display: none;
  }

  #title {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #00ffff;
    font-size: 14px;
    letter-spacing: 1px;
    text-shadow: 0 0 6px #00ffff;
    z-index: 5;
    pointer-events: none;
  }

  #statusMsg {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff00ff;
    font-size: 13px;
    text-shadow: 0 0 6px #ff00ff;
    z-index: 5;
    pointer-events: none;
  }

  /* Zoom controls */
  #zoomControls {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 6;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0, 0, 0, 0.45);
    padding: 6px 8px;
    border-radius: 20px;
    border: 1px solid rgba(0, 255, 255, 0.3);
  }

  #zoomControls button {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(0, 255, 255, 0.5);
    background: rgba(0, 255, 255, 0.08);
    color: #00ffff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
  }

  #zoomControls button:hover {
    background: rgba(0, 255, 255, 0.25);
  }

  #zoomLevelLabel {
    color: #00ffff;
    font-size: 12px;
    min-width: 40px;
    text-align: center;
    text-shadow: 0 0 4px #00ffff;
    user-select: none;
  }

  /* People counter panel (right side, outside the mirrored canvas) */
  #peopleCounter {
    position: absolute;
    top: 52px;
    right: 10px;
    z-index: 6;
    background: rgba(0, 0, 0, 0.45);
    border: 1px solid rgba(0, 255, 102, 0.4);
    border-radius: 10px;
    padding: 8px 12px;
    color: #00FF66;
    font-size: 14px;
    font-weight: bold;
    text-shadow: 0 0 6px #00FF66;
    user-select: none;
  }

  /* Big center countdown number for the selfie timer */
  #countdownOverlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 100px;
    font-weight: bold;
    color: rgba(255, 215, 0, 0.9);
    text-shadow: 0 0 20px #FFD700;
    z-index: 8;
    pointer-events: none;
    display: none;
  }

  /* Name inputs (bottom-left, outside mirrored canvas) */
  #nameInputs {
    position: absolute;
    bottom: 10px;
    left: 10px;
    z-index: 6;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #nameInputs input {
    width: 110px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(0, 255, 102, 0.4);
    border-radius: 6px;
    color: #00FF66;
    font-size: 11px;
    padding: 4px 6px;
    outline: none;
  }
</style>
</head>
<body>

<div id="container">
  <div id="title">Facial and Hand Landmarks</div>

  <div id="zoomControls">
    <button id="zoomOutBtn" title="Zoom out">−</button>
    <span id="zoomLevelLabel">100%</span>
    <button id="zoomInBtn" title="Zoom in">+</button>
    <button id="zoomResetBtn" title="Reset zoom">⟳</button>
    <button id="screenshotBtn" title="Take screenshot">📸</button>
    <button id="recordBtn" title="Start recording">🎥</button>
  </div>

  <div id="canvasWrap">
    <canvas id="outputCanvas" width="640" height="480"></canvas>
  </div>
  <div id="peopleCounter">👥 People: 0</div>
  <div id="countdownOverlay">3</div>
  <div id="nameInputs">
    <input id="face1NameInput" type="text" placeholder="Face1 name" maxlength="12">
    <input id="face2NameInput" type="text" placeholder="Face2 name" maxlength="12">
  </div>
  <video id="inputVideo" playsinline autoplay muted></video>
  <div id="statusMsg">Requesting camera access…</div>
</div>

<!-- MediaPipe FaceMesh (multi-face) + Hands (multi-hand) + drawing/camera utilities -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
/* =========================================================
   Facial + Hand Landmark Tracker
   (JS/HTML/Canvas equivalent of the Python MediaPipe Holistic script)
   ========================================================= */

const videoEl = document.getElementById('inputVideo');
const canvasEl = document.getElementById('outputCanvas');
const canvasCtx = canvasEl.getContext('2d');
const statusMsg = document.getElementById('statusMsg');
const peopleCounterEl = document.getElementById('peopleCounter');
const face1NameInput = document.getElementById('face1NameInput');
const face2NameInput = document.getElementById('face2NameInput');
const countdownOverlay = document.getElementById('countdownOverlay');

// FPS tracking, same idea as previousTime / currentTime in the Python version
let previousTime = 0;

// ---- Fist / "punch" detection -------------------------------------------
// A hand counts as a closed fist if the four main fingers (index, middle,
// ring, pinky) are folded down - i.e. each fingertip sits below (higher y
// value than) its middle knuckle (pip joint).
function isFist(landmarks) {
  const fingerTips = [8, 12, 16, 20];
  const fingerPips = [6, 10, 14, 18];
  return fingerTips.every((tipIdx, i) => {
    const tip = landmarks[tipIdx];
    const pip = landmarks[fingerPips[i]];
    return tip.y > pip.y;
  });
}

// Open palm: all four main fingers clearly extended upward/outward
function isOpenPalm(landmarks) {
  const fingerTips = [8, 12, 16, 20];
  const fingerPips = [6, 10, 14, 18];
  return fingerTips.every((tipIdx, i) => {
    const tip = landmarks[tipIdx];
    const pip = landmarks[fingerPips[i]];
    return tip.y < pip.y - 0.02;
  });
}

// Thumbs up: the four main fingers are curled (fist-like) but the thumb
// sticks up clearly above both its own base joint and the wrist.
function isThumbsUp(landmarks) {
  const wrist = landmarks[0];
  const thumbTip = landmarks[4];
  const thumbMcp = landmarks[2];
  const fingersCurled = isFist(landmarks);
  const thumbExtendedUp = (thumbTip.y < thumbMcp.y - 0.03) && (thumbTip.y < wrist.y - 0.05);
  return fingersCurled && thumbExtendedUp;
}

// Classifies a single hand's overall gesture, checking the most specific first
function classifyHand(landmarks) {
  if (!landmarks) return null;
  if (isThumbsUp(landmarks)) return 'thumbsUp';
  if (isFist(landmarks)) return 'fist';
  if (isOpenPalm(landmarks)) return 'openPalm';
  return 'other';
}

// ---- Smile / sad expression detection ------------------------------------
// Uses FaceMesh landmark indices: mouth corners (61, 291), upper/lower lip
// center (13, 14), and eye corners (33, 263) to normalize for face size.
// NOTE: these thresholds are heuristic - tweak the constants below if your
// lighting/camera makes detection feel too sensitive or not sensitive enough.
const SMILE_WIDTH_RATIO_THRESHOLD = 1.15;
const SMILE_CORNER_LIFT_THRESHOLD = 0.020;
const SAD_CORNER_DROOP_THRESHOLD = -0.012;
const MOUTH_OPEN_RATIO_THRESHOLD = 0.40;   // wide open mouth -> surprised
const BROW_RAISE_RATIO_THRESHOLD = 0.34;   // eyebrows raised high -> surprised
const BROW_FURROW_RATIO_THRESHOLD = 0.20;  // eyebrows pulled low/close -> angry

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// Mood -> box/label color mapping
const MOOD_COLORS = {
  Happy: '#FFFF00',      // yellow
  Sad: '#B266FF',        // purple
  Angry: '#FF3333',      // red
  Surprised: '#00CFFF',  // light blue
  Neutral: '#00FF66'     // green (default)
};

// Rolling-average smoothing per face slot (0 or 1) so the reading doesn't
// flicker frame-to-frame - makes detection feel much more stable/accurate.
const EXPRESSION_HISTORY_SIZE = 6;
const expressionHistory = [[], []];

function getExpression(landmarks, faceIdx) {
  const leftCorner = landmarks[61];
  const rightCorner = landmarks[291];
  const upperLip = landmarks[13];
  const lowerLip = landmarks[14];
  const leftEye = landmarks[33];
  const rightEye = landmarks[263];
  const leftBrow = landmarks[105];
  const rightBrow = landmarks[334];
  const leftEyeTop = landmarks[159];
  const rightEyeTop = landmarks[386];

  const interocular = dist(leftEye, rightEye) || 0.0001;
  const mouthWidth = dist(leftCorner, rightCorner);
  const widthRatio = mouthWidth / interocular;

  const mouthCenterY = (upperLip.y + lowerLip.y) / 2;
  const cornerAvgY = (leftCorner.y + rightCorner.y) / 2;
  const cornerLift = (mouthCenterY - cornerAvgY) / interocular;

  const mouthOpenRatio = dist(upperLip, lowerLip) / interocular;
  const browGap = ((leftEyeTop.y - leftBrow.y) + (rightEyeTop.y - rightBrow.y)) / 2;
  const browRatio = browGap / interocular;

  // Push this frame's raw metrics into the rolling history for this face slot
  const idx = faceIdx === 0 || faceIdx === 1 ? faceIdx : 0;
  const history = expressionHistory[idx];
  history.push({ widthRatio, cornerLift, mouthOpenRatio, browRatio });
  if (history.length > EXPRESSION_HISTORY_SIZE) history.shift();

  // Average over the history window to smooth out jitter
  const avg = history.reduce((acc, h) => {
    acc.widthRatio += h.widthRatio / history.length;
    acc.cornerLift += h.cornerLift / history.length;
    acc.mouthOpenRatio += h.mouthOpenRatio / history.length;
    acc.browRatio += h.browRatio / history.length;
    return acc;
  }, { widthRatio: 0, cornerLift: 0, mouthOpenRatio: 0, browRatio: 0 });

  let label;
  if (avg.mouthOpenRatio > MOUTH_OPEN_RATIO_THRESHOLD && avg.browRatio > BROW_RAISE_RATIO_THRESHOLD) {
    label = 'Surprised';
  } else if (avg.widthRatio > SMILE_WIDTH_RATIO_THRESHOLD || avg.cornerLift > SMILE_CORNER_LIFT_THRESHOLD) {
    label = 'Happy';
  } else if (avg.browRatio < BROW_FURROW_RATIO_THRESHOLD && avg.cornerLift <= 0) {
    label = 'Angry';
  } else if (avg.cornerLift < SAD_CORNER_DROOP_THRESHOLD) {
    label = 'Sad';
  } else {
    label = 'Neutral';
  }

  const emojiMap = { Happy: '😊', Sad: '😢', Angry: '😠', Surprised: '😮', Neutral: '😐' };
  return { label, emoji: emojiMap[label], color: MOOD_COLORS[label] };
}

// ---- MediaPipe model setup ------------------------------------------------
// FaceMesh handles MULTIPLE faces (multiple people); Hands handles MULTIPLE
// hands. Both run on every frame and we combine their latest results to draw.
const faceMesh = new FaceMesh({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});
faceMesh.setOptions({
  maxNumFaces: 2,
  refineLandmarks: false,   // keep it light for better FPS
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 0,   // "lite" model - faster, good enough for gestures
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

let latestFaceResults = null;
let latestHandResults = null;
let previousHandAngle = null; // tracks rotation for steering-wheel style zoom control
let prevThumbsUp = false;
let prevOpenPalm = false;
let countdownActive = false;
let countdownValue = 0;
let countdownIntervalId = null;

// If zoom direction feels backwards on your setup, flip this to true.
const INVERT_ROTATION_DIRECTION = false;

// Customizable colors (changed live via the color pickers)
let SHIELD_COLOR = '#FFD700';
let BOX_COLOR = '#00FF66';

faceMesh.onResults((results) => { latestFaceResults = results; });
hands.onResults((results) => { latestHandResults = results; });

// ---- Simple sound effects (Web Audio oscillator beeps, no audio files needed) ----
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playBeep(freq, duration, type = 'sine', volume = 0.15) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration / 1000);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration / 1000);
  } catch (e) { /* audio may be blocked until first user interaction - safe to ignore */ }
}
function playZoomSound(zoomingIn) {
  playBeep(zoomingIn ? 700 : 400, 90, 'sine', 0.08);
}
function playScreenshotSound() {
  playBeep(1000, 60, 'square', 0.12);
  setTimeout(() => playBeep(1400, 70, 'square', 0.12), 70);
}
function playTingSound() {
  playBeep(1200, 150, 'triangle', 0.1);
}
function playClickSound() {
  playBeep(500, 60, 'square', 0.08);
}

// ---- Doctor Strange style glowing shield, drawn in the palm --------------
// Deliberately kept simple: two rings, an 8-point star pattern, and tick
// marks around the edge - rotates live with the hand's orientation.
function drawMagicShield(ctx, cx, cy, radius, angle) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.strokeStyle = SHIELD_COLOR;
  ctx.fillStyle = SHIELD_COLOR;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.9;

  // Outer + inner rings
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, radius * 0.7, 0, Math.PI * 2);
  ctx.stroke();

  // 8-point star, connecting every 3rd point around the inner ring
  const points = 8;
  ctx.beginPath();
  for (let i = 0; i < points; i++) {
    const a1 = (i / points) * Math.PI * 2;
    const a2 = ((i + 3) / points) * Math.PI * 2;
    ctx.moveTo(Math.cos(a1) * radius * 0.7, Math.sin(a1) * radius * 0.7);
    ctx.lineTo(Math.cos(a2) * radius * 0.7, Math.sin(a2) * radius * 0.7);
  }
  ctx.stroke();

  // Tick marks around the outer edge, like a rune circle
  const ticks = 16;
  for (let i = 0; i < ticks; i++) {
    const a = (i / ticks) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * radius, Math.sin(a) * radius);
    ctx.lineTo(Math.cos(a) * radius * 1.1, Math.sin(a) * radius * 1.1);
    ctx.stroke();
  }

  // Center glowing dot
  ctx.beginPath();
  ctx.arc(0, 0, radius * 0.08, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ---- Energy beam connecting two shields when both hands are visible ----
function drawEnergyBeam(ctx, p1, p2) {
  ctx.save();
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 150);
  ctx.strokeStyle = SHIELD_COLOR;
  ctx.globalAlpha = 0.35 + 0.35 * pulse;
  ctx.lineWidth = 3 + pulse * 2;
  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.lineTo(p2.x, p2.y);
  ctx.stroke();
  ctx.restore();
}

// ---- Main draw + logic pass (runs once per camera frame) -----------------
function drawAll() {
  const bgImage = (latestFaceResults && latestFaceResults.image) ||
                  (latestHandResults && latestHandResults.image);
  if (!bgImage) return;

  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvasEl.width, canvasEl.height);
  canvasCtx.drawImage(bgImage, 0, 0, canvasEl.width, canvasEl.height);

  // ---- Faces: green box + Face# + expression label + emoji per person ----
  const faceLandmarksArr = (latestFaceResults && latestFaceResults.multiFaceLandmarks) || [];

  faceLandmarksArr.forEach((landmarks, idx) => {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const pt of landmarks) {
      const x = pt.x * canvasEl.width;
      const y = pt.y * canvasEl.height;
      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
    }
    const pad = 12;
    minX -= pad; minY -= pad; maxX += pad; maxY += pad;

    const expression = getExpression(landmarks);
    const nameInput = idx === 0 ? face1NameInput : face2NameInput;
    const displayName = (nameInput && nameInput.value.trim()) || `Face${idx + 1}`;

    canvasCtx.save();
    canvasCtx.strokeStyle = BOX_COLOR;
    canvasCtx.lineWidth = 3;
    canvasCtx.strokeRect(minX, minY, maxX - minX, maxY - minY);

    // Text is drawn locally mirrored so it reads correctly, since the whole
    // canvasWrap is flipped with CSS scaleX(-1)
    canvasCtx.scale(-1, 1);
    canvasCtx.font = "bold 14px 'Segoe UI', Arial, sans-serif";
    canvasCtx.fillStyle = BOX_COLOR;
    canvasCtx.textAlign = 'right';
    canvasCtx.fillText(`${displayName}: ${expression.label}`, -minX, minY - 6);

    // Emoji next to the face, drawn a bit bigger
    canvasCtx.font = "20px 'Segoe UI', Arial, sans-serif";
    canvasCtx.fillText(expression.emoji, -maxX - 4, minY + 20);
    canvasCtx.restore();
  });

  // Update the people counter panel (plain HTML, unaffected by canvas mirroring)
  peopleCounterEl.textContent = `👥 People: ${faceLandmarksArr.length}`;

  // ---- Hands: draw all detected hands, alternating colors per handedness ----
  const handLandmarksArr = (latestHandResults && latestHandResults.multiHandLandmarks) || [];
  const handednessArr = (latestHandResults && latestHandResults.multiHandedness) || [];
  const palmCenters = [];

  handLandmarksArr.forEach((lm, i) => {
    // ---- Doctor Strange shield in the palm (hand skeleton dots/lines removed for a cleaner look) ----
    const palmIdxs = [0, 5, 9, 13, 17];
    let px = 0, py = 0;
    palmIdxs.forEach((idx) => { px += lm[idx].x; py += lm[idx].y; });
    px = (px / palmIdxs.length) * canvasEl.width;
    py = (py / palmIdxs.length) * canvasEl.height;

    // Hand orientation angle, used to spin the shield with the hand
    const wrist = lm[0];
    const middleMcp = lm[9];
    const dx = (middleMcp.x - wrist.x) * canvasEl.width;
    const dy = (middleMcp.y - wrist.y) * canvasEl.height;
    const handAngle = Math.atan2(dy, dx) + Math.PI / 2; // +90° so it faces "up" the hand

    // Shield size scales with hand size (distance wrist -> middle knuckle)
    const handSize = Math.hypot(dx, dy);
    const shieldRadius = handSize * 0.9;

    drawMagicShield(canvasCtx, px, py, shieldRadius, handAngle);
    palmCenters.push({ x: px, y: py });
  });

  // If both hands are visible, connect their shields with a pulsing energy beam
  if (palmCenters.length === 2) {
    drawEnergyBeam(canvasCtx, palmCenters[0], palmCenters[1]);
  }

  // ---- FPS calculation, same formula as the Python version ----
  const currentTime = performance.now() / 1000;
  const fps = previousTime > 0 ? Math.round(1 / (currentTime - previousTime)) : 0;
  previousTime = currentTime;

  canvasCtx.font = "bold 22px 'Segoe UI', Arial, sans-serif";
  canvasCtx.fillStyle = "#00FF00";
  canvasCtx.textAlign = "left";
  canvasCtx.fillText(`${fps} FPS`, 10, 40);

  canvasCtx.restore();

  // ---- Gesture-controlled zoom, screenshot, and reset (across all hands) ----
  let thumbsUpDetected = false;
  let openPalmDetected = false;

  handLandmarksArr.forEach((lm) => {
    const gesture = classifyHand(lm);
    if (gesture === 'thumbsUp') thumbsUpDetected = true;
    if (gesture === 'openPalm') openPalmDetected = true;
  });

  const totalHands = handLandmarksArr.length;
  let gestureMsg = "";
  const now = Date.now();

  // ---- Steering-wheel zoom: rotate your hand like turning a wheel ----
  // Uses the first detected hand as the "steering hand". Rotating clockwise
  // (like turning a wheel right) zooms in; counter-clockwise zooms out.
  // NOTE: this is skipped while that hand is doing a thumbs-up or open-palm
  // gesture, since the natural hand tilt during those gestures was previously
  // being misread as a steering rotation and triggering an unwanted zoom.
  const steeringHandGesture = totalHands >= 1 ? classifyHand(handLandmarksArr[0]) : null;
  const steeringHandBusy = steeringHandGesture === 'thumbsUp' || steeringHandGesture === 'openPalm';

  if (totalHands >= 1 && !steeringHandBusy) {
    const wrist = handLandmarksArr[0][0];
    const middleMcp = handLandmarksArr[0][9];
    const currentAngle = Math.atan2(
      (middleMcp.y - wrist.y) * canvasEl.height,
      (middleMcp.x - wrist.x) * canvasEl.width
    );

    if (previousHandAngle !== null) {
      let delta = currentAngle - previousHandAngle;
      // normalize to [-PI, PI] so the wraparound at ±180° doesn't cause a jump
      if (delta > Math.PI) delta -= Math.PI * 2;
      if (delta < -Math.PI) delta += Math.PI * 2;
      if (INVERT_ROTATION_DIRECTION) delta = -delta;

      const ROTATION_ZOOM_SENSITIVITY = 3.2;
      const ROTATION_DEADZONE = 0.025; // ignores tiny natural hand jitter

      if (Math.abs(delta) > ROTATION_DEADZONE) {
        if (delta > 0) {
          zoomIn(delta * ROTATION_ZOOM_SENSITIVITY);
          gestureMsg = "🟡 Rotating right — zooming in";
        } else {
          zoomOut(-delta * ROTATION_ZOOM_SENSITIVITY);
          gestureMsg = "🟡 Rotating left — zooming out";
        }
      }
    }
    previousHandAngle = currentAngle;
  } else {
    // Reset whenever there's no hand, or the hand is busy with another gesture,
    // so we don't get a big stale-angle jump when steering resumes afterward.
    previousHandAngle = null;
  }

  if (thumbsUpDetected && !prevThumbsUp && !countdownActive && (now - lastScreenshotTime > SCREENSHOT_COOLDOWN_MS)) {
    startCountdownScreenshot();
  }
  prevThumbsUp = thumbsUpDetected;

  if (openPalmDetected && !prevOpenPalm) {
    zoomReset();
    playClickSound();
  }
  prevOpenPalm = openPalmDetected;

  if (countdownActive) {
    gestureMsg = `📸 Get ready… ${countdownValue}`;
  } else if (openPalmDetected) {
    gestureMsg = "🖐 Open palm — zoom reset";
  }

  const hasFace = faceLandmarksArr.length > 0;
  const hasHands = totalHands > 0;
  if (!hasFace && !hasHands) {
    statusMsg.textContent = "No face or hands detected — move closer to the camera";
  } else {
    statusMsg.textContent = gestureMsg;
  }
}

// ---- Countdown selfie timer: thumbs up starts a 3-2-1 countdown, then snaps ----
function startCountdownScreenshot() {
  countdownActive = true;
  countdownValue = 3;
  countdownOverlay.style.display = 'block';
  countdownOverlay.textContent = countdownValue;
  playTingSound();

  countdownIntervalId = setInterval(() => {
    countdownValue--;
    if (countdownValue <= 0) {
      clearInterval(countdownIntervalId);
      countdownOverlay.style.display = 'none';
      countdownActive = false;
      takeScreenshot();
      lastScreenshotTime = Date.now();
    } else {
      countdownOverlay.textContent = countdownValue;
      playTingSound();
    }
  }, 1000);
}

// ---- Camera bootstrap ---------------------------------------------------
const camera = new Camera(videoEl, {
  onFrame: async () => {
    await faceMesh.send({ image: videoEl });
    await hands.send({ image: videoEl });
    drawAll();
  },
  width: 800,
  height: 600
});

camera.start().catch((err) => {
  statusMsg.textContent = "Camera access denied — please allow permissions and reload the page.";
  console.error(err);
});

// ---- Zoom controls --------------------------------------------------------
const canvasWrap = document.getElementById('canvasWrap');
const zoomInBtn = document.getElementById('zoomInBtn');
const zoomOutBtn = document.getElementById('zoomOutBtn');
const zoomResetBtn = document.getElementById('zoomResetBtn');
const zoomLevelLabel = document.getElementById('zoomLevelLabel');

let zoomLevel = 1;           // 1 = 100% (no zoom)
const MIN_ZOOM = 1;
const MAX_ZOOM = 3;
const ZOOM_STEP = 0.2;         // used for button clicks / scroll wheel
const GESTURE_ZOOM_STEP = 0.02; // smaller, smoother step used per-frame for fist gestures

function applyZoom() {
  // scaleX(-1) keeps the mirrored view; scale(zoomLevel) zooms in/out from the center
  canvasWrap.style.transform = `scaleX(-1) scale(${zoomLevel})`;
  zoomLevelLabel.textContent = `${Math.round(zoomLevel * 100)}%`;
}

function zoomIn(step = ZOOM_STEP) {
  zoomLevel = Math.min(MAX_ZOOM, +(zoomLevel + step).toFixed(3));
  applyZoom();
}

function zoomOut(step = ZOOM_STEP) {
  zoomLevel = Math.max(MIN_ZOOM, +(zoomLevel - step).toFixed(3));
  applyZoom();
}

function zoomReset() {
  zoomLevel = 1;
  applyZoom();
}

// ---- Screenshot ------------------------------------------------------------
let lastScreenshotTime = 0;
const SCREENSHOT_COOLDOWN_MS = 2500; // avoid spamming saves while thumbs-up is held

function takeScreenshot() {
  // The visible canvas is mirrored purely via CSS (scaleX(-1) on its wrapper),
  // so we redraw it flipped onto a temp canvas to save exactly what's on screen.
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = canvasEl.width;
  tempCanvas.height = canvasEl.height;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.translate(tempCanvas.width, 0);
  tempCtx.scale(-1, 1);
  tempCtx.drawImage(canvasEl, 0, 0);

  const link = document.createElement('a');
  link.href = tempCanvas.toDataURL('image/png');
  link.download = `snapshot_${Date.now()}.png`;
  link.click();
}

document.getElementById('screenshotBtn').addEventListener('click', takeScreenshot);

zoomInBtn.addEventListener('click', zoomIn);
zoomOutBtn.addEventListener('click', zoomOut);
zoomResetBtn.addEventListener('click', zoomReset);

// Mouse-wheel zoom: scroll up to zoom in, scroll down to zoom out
document.getElementById('container').addEventListener('wheel', (e) => {
  e.preventDefault();
  if (e.deltaY < 0) zoomIn();
  else zoomOut();
}, { passive: false });
</script>
