<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gesture Workout Picker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #050208;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
  }

  #container {
    position: relative;
    width: 720px;
    max-width: 100vw;
    aspect-ratio: 720 / 540;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
  }

  #canvasWrap {
    transform: scaleX(-1); /* mirror, like looking in a mirror */
    width: 100%;
    height: 100%;
  }

  canvas { width: 100%; height: 100%; display: block; }
  video { display: none; }

  #instructions {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    color: #00ffff;
    font-size: 12px;
    text-align: center;
    text-shadow: 0 0 6px #00ffff;
    z-index: 6;
    pointer-events: none;
    max-width: 90%;
    line-height: 1.4;
  }

  /* The 3 option boxes, arranged left / center / right */
  #optionRow {
    position: absolute;
    bottom: 14px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-around;
    padding: 0 12px;
    z-index: 6;
    pointer-events: none;
  }

  .option-box {
    width: 30%;
    background: rgba(0, 0, 0, 0.55);
    border: 2px solid rgba(0, 255, 255, 0.4);
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
    color: #00ffff;
    font-size: 12px;
    font-weight: bold;
    transition: all 0.15s ease;
  }

  .option-box .triangle {
    width: 0;
    height: 0;
    margin: 0 auto 6px auto;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-bottom: 22px solid #00ffff;
    opacity: 0.7;
  }

  .option-box.hovered {
    border-color: #FFD700;
    background: rgba(255, 215, 0, 0.15);
    transform: scale(1.06);
  }

  .option-box.hovered .triangle {
    border-bottom-color: #FFD700;
    opacity: 1;
  }

  /* Big center message: CANCEL / countdown numbers / GO!!! */
  #centerMessage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 90px;
    font-weight: 900;
    text-shadow: 0 0 24px currentColor;
    z-index: 8;
    pointer-events: none;
    display: none;
  }

  /* Workout screen overlay */
  #workoutPanel {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 7;
    text-align: center;
    display: none;
    width: 90%;
  }

  #workoutPanel .exerciseName {
    color: #00FF66;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 0 0 10px #00FF66;
    margin-bottom: 6px;
  }

  #workoutPanel .exerciseKind {
    color: #FFD700;
    font-size: 13px;
    margin-bottom: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  #workoutPanel .timeLeft {
    color: #fff;
    font-size: 46px;
    font-weight: bold;
  }

  #workoutPanel .skipHint {
    color: #00ffff;
    font-size: 12px;
    margin-top: 6px;
    opacity: 0.85;
  }

  #statusMsg {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff00ff;
    font-size: 12px;
    text-shadow: 0 0 6px #ff00ff;
    z-index: 6;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="container">
  <div id="instructions">
    Point your finger LEFT / CENTER / RIGHT to choose an option below.<br>
    Hold a 👍 thumbs-up for 5 seconds (or say "go") to confirm.
  </div>

  <div id="canvasWrap">
    <canvas id="outputCanvas" width="720" height="540"></canvas>
  </div>

  <video id="inputVideo" playsinline autoplay muted></video>

  <div id="optionRow">
    <div class="option-box" id="box-weightLoss">
      <div class="triangle"></div>
      Weight Loss
    </div>
    <div class="option-box" id="box-abs">
      <div class="triangle"></div>
      Ab Exercises
    </div>
    <div class="option-box" id="box-basic">
      <div class="triangle"></div>
      Basic Body Exercises
    </div>
  </div>

  <div id="centerMessage"></div>

  <div id="workoutPanel">
    <div class="exerciseKind" id="exerciseKind">Warm-up</div>
    <div class="exerciseName" id="exerciseName">Jumping Jacks</div>
    <div class="timeLeft" id="timeLeft">30</div>
    <div class="skipHint">✋ Show both palms open to skip this exercise</div>
  </div>

  <div id="statusMsg">Requesting camera access…</div>
</div>

<!-- MediaPipe Hands + camera utility -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
/* =========================================================
   GESTURE WORKOUT PICKER
   Point to choose a plan, hold thumbs-up (or say "go") to
   confirm, then follow the on-screen exercises. Show both
   palms open at once to skip the current exercise.
   ========================================================= */

const videoEl = document.getElementById('inputVideo');
const canvasEl = document.getElementById('outputCanvas');
const canvasCtx = canvasEl.getContext('2d');
const statusMsg = document.getElementById('statusMsg');
const centerMessage = document.getElementById('centerMessage');
const workoutPanel = document.getElementById('workoutPanel');
const exerciseKindEl = document.getElementById('exerciseKind');
const exerciseNameEl = document.getElementById('exerciseName');
const timeLeftEl = document.getElementById('timeLeft');
const boxEls = {
  weightLoss: document.getElementById('box-weightLoss'),
  abs: document.getElementById('box-abs'),
  basic: document.getElementById('box-basic')
};

// ---- Exercise plans ---------------------------------------------------
const EXERCISE_PLANS = {
  weightLoss: {
    label: 'Weight Loss',
    warmups: [
      { name: 'Jumping Jacks', duration: 30 },
      { name: 'Arm Circles', duration: 20 }
    ],
    exercises: [
      { name: 'Squats', duration: 40 },
      { name: 'High Knees', duration: 30 },
      { name: 'Burpees', duration: 30 },
      { name: 'Mountain Climbers', duration: 30 }
    ]
  },
  abs: {
    label: 'Ab Exercises',
    warmups: [
      { name: 'Torso Twists', duration: 20 },
      { name: 'Cat-Cow Stretch', duration: 20 }
    ],
    exercises: [
      { name: 'Crunches', duration: 30 },
      { name: 'Plank', duration: 30 },
      { name: 'Leg Raises', duration: 30 },
      { name: 'Bicycle Crunches', duration: 30 }
    ]
  },
  basic: {
    label: 'Basic Body Exercises',
    warmups: [
      { name: 'Arm Swings', duration: 20 },
      { name: 'Neck Rolls', duration: 15 }
    ],
    exercises: [
      { name: 'Push-ups', duration: 30 },
      { name: 'Lunges', duration: 30 },
      { name: 'Wall Sit', duration: 30 },
      { name: 'Squat Hold', duration: 20 }
    ]
  }
};

// ---- App state machine -------------------------------------------------
// 'select' -> 'cancelFlash' -> back to 'select'
// 'select' -> 'countdown' -> 'workout' -> 'done'
let appState = 'select';
let hoveredOption = null;      // 'weightLoss' | 'abs' | 'basic' | null (sticky once set)
let thumbsHoldStart = null;    // timestamp when thumbs-up hold began
const CONFIRM_HOLD_MS = 5000;

let countdownValue = 5;
let countdownIntervalId = null;

let exerciseQueue = [];
let exerciseIndex = 0;
let exerciseRemaining = 0;
let exerciseIntervalId = null;
let prevBothOpen = false;

// ---- Hand gesture helpers -----------------------------------------------
function isOpenPalm(landmarks) {
  const fingerTips = [8, 12, 16, 20];
  const fingerPips = [6, 10, 14, 18];
  return fingerTips.every((tipIdx, i) => landmarks[tipIdx].y < landmarks[fingerPips[i]].y - 0.02);
}

function isFistCurled(landmarks) {
  const fingerTips = [8, 12, 16, 20];
  const fingerPips = [6, 10, 14, 18];
  return fingerTips.every((tipIdx, i) => landmarks[tipIdx].y > landmarks[fingerPips[i]].y);
}

function isThumbsUp(landmarks) {
  const wrist = landmarks[0];
  const thumbTip = landmarks[4];
  const thumbMcp = landmarks[2];
  const fingersCurled = isFistCurled(landmarks);
  const thumbExtendedUp = (thumbTip.y < thumbMcp.y - 0.03) && (thumbTip.y < wrist.y - 0.05);
  return fingersCurled && thumbExtendedUp;
}

// Index-finger pointing direction: left / center / right.
// If INVERT_POINTING_DIRECTION feels backwards on your setup, flip it to true.
const INVERT_POINTING_DIRECTION = false;

function getPointingDirection(landmarks) {
  const indexTip = landmarks[8];
  const indexPip = landmarks[6];
  const indexMcp = landmarks[5];

  // Require the index finger to be clearly extended, otherwise this isn't a pointing gesture
  if (!(indexTip.y < indexPip.y - 0.02)) return null;

  const dx = indexTip.x - indexMcp.x;
  const dy = indexTip.y - indexMcp.y;
  let angleDeg = Math.atan2(dy, dx) * (180 / Math.PI);
  if (INVERT_POINTING_DIRECTION) angleDeg = -angleDeg;

  if (angleDeg > -45 && angleDeg < 45) return 'right';
  if (angleDeg > 135 || angleDeg < -135) return 'left';
  return 'center'; // pointing roughly straight up or down
}

// ---- MediaPipe Hands setup ------------------------------------------------
const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 0,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

let latestResults = null;
hands.onResults((results) => { latestResults = results; drawAndUpdate(); });

const camera = new Camera(videoEl, {
  onFrame: async () => { await hands.send({ image: videoEl }); },
  width: 720,
  height: 540
});
camera.start().catch((err) => {
  statusMsg.textContent = "Camera access denied — please allow permissions and reload.";
  console.error(err);
});

// ---- Voice command: say "go" to confirm the highlighted option -----------
let recognition = null;
function setupVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.onresult = (event) => {
    const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
    if (transcript.includes('go') && appState === 'select' && hoveredOption) {
      confirmSelectionAndStartCountdown();
    }
  };
  recognition.onerror = () => {};
  recognition.onend = () => { try { recognition.start(); } catch (e) {} }; // keep listening
  try { recognition.start(); } catch (e) {}
}
setupVoice();

// ---- Main per-frame update ------------------------------------------------
function drawAndUpdate() {
  if (!latestResults) return;

  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvasEl.width, canvasEl.height);
  canvasCtx.drawImage(latestResults.image, 0, 0, canvasEl.width, canvasEl.height);
  canvasCtx.restore();

  const handList = latestResults.multiHandLandmarks || [];

  if (appState === 'select') {
    updateSelectState(handList);
  } else if (appState === 'workout') {
    updateWorkoutSkipCheck(handList);
  }
}

// ---- SELECT state: pointing to hover, thumbs-up hold to confirm ----------
function updateSelectState(handList) {
  // Update hover based on the first hand doing a valid pointing gesture.
  // Hover is "sticky" - if no pointing gesture is currently detected (e.g. hand
  // switched to a thumbs-up shape), we keep the last hovered option.
  for (const lm of handList) {
    const dir = getPointingDirection(lm);
    if (dir === 'left') hoveredOption = 'weightLoss';
    else if (dir === 'center') hoveredOption = 'abs';
    else if (dir === 'right') hoveredOption = 'basic';
  }
  updateBoxHighlight();

  // Check for a thumbs-up hold among any detected hand
  const thumbsUpNow = handList.some((lm) => isThumbsUp(lm));

  if (thumbsUpNow && hoveredOption) {
    if (thumbsHoldStart === null) thumbsHoldStart = Date.now();
    const elapsed = Date.now() - thumbsHoldStart;
    const secondsHeld = Math.min(5, Math.ceil(elapsed / 1000));
    statusMsg.textContent = `Holding 👍 for ${hoveredOption}… ${secondsHeld}/5s`;

    // Also show the selected plan name big in the center while holding
    centerMessage.style.display = 'block';
    centerMessage.style.fontSize = '48px';
    centerMessage.style.color = '#FFD700';
    centerMessage.textContent = `${EXERCISE_PLANS[hoveredOption].label} (${secondsHeld}/5)`;

    if (elapsed >= CONFIRM_HOLD_MS) {
      confirmSelectionAndStartCountdown();
    }
  } else {
    // Thumbs-up released or hand gone - if we had started a hold, flash CANCEL
    if (thumbsHoldStart !== null) {
      showCancelFlash();
    } else if (appState === 'select') {
      centerMessage.style.display = 'none';
    }
    thumbsHoldStart = null;
    if (!hoveredOption) {
      statusMsg.textContent = "Point your finger left / center / right to choose";
    } else if (appState === 'select') {
      statusMsg.textContent = `Selected: ${EXERCISE_PLANS[hoveredOption].label} — hold 👍 or say "go" to confirm`;
    }
  }
}

function updateBoxHighlight() {
  Object.keys(boxEls).forEach((key) => {
    boxEls[key].classList.toggle('hovered', hoveredOption === key);
  });
}

function showCancelFlash() {
  appState = 'cancelFlash';
  centerMessage.style.display = 'block';
  centerMessage.style.fontSize = '90px';
  centerMessage.style.color = '#FF3333';
  centerMessage.textContent = 'CANCEL';
  setTimeout(() => {
    centerMessage.style.display = 'none';
    appState = 'select';
  }, 1200);
}

// ---- Confirm + countdown -------------------------------------------------
function confirmSelectionAndStartCountdown() {
  appState = 'countdown';
  thumbsHoldStart = null;
  countdownValue = 5;
  centerMessage.style.display = 'block';
  centerMessage.style.fontSize = '90px';
  centerMessage.style.color = '#FFD700';
  centerMessage.textContent = countdownValue;

  countdownIntervalId = setInterval(() => {
    countdownValue--;
    if (countdownValue > 0) {
      centerMessage.style.color = '#FFD700';
      centerMessage.textContent = countdownValue;
    } else {
      clearInterval(countdownIntervalId);
      centerMessage.style.color = '#00FF66';
      centerMessage.textContent = 'GO!!!';
      setTimeout(() => {
        centerMessage.style.display = 'none';
        startWorkout(hoveredOption);
      }, 900);
    }
  }, 1000);
}

// ---- Workout flow ----------------------------------------------------------
function startWorkout(planKey) {
  appState = 'workout';
  const plan = EXERCISE_PLANS[planKey];
  exerciseQueue = [
    ...plan.warmups.map((e) => ({ ...e, kind: 'Warm-up' })),
    ...plan.exercises.map((e) => ({ ...e, kind: 'Exercise' }))
  ];
  exerciseIndex = 0;
  workoutPanel.style.display = 'block';
  runCurrentExercise();
}

function runCurrentExercise() {
  if (exerciseIndex >= exerciseQueue.length) {
    finishWorkout();
    return;
  }
  const ex = exerciseQueue[exerciseIndex];
  exerciseRemaining = ex.duration;
  exerciseKindEl.textContent = ex.kind;
  exerciseNameEl.textContent = ex.name;
  timeLeftEl.textContent = exerciseRemaining;

  clearInterval(exerciseIntervalId);
  exerciseIntervalId = setInterval(() => {
    exerciseRemaining--;
    timeLeftEl.textContent = exerciseRemaining;
    if (exerciseRemaining <= 0) {
      clearInterval(exerciseIntervalId);
      exerciseIndex++;
      runCurrentExercise();
    }
  }, 1000);
}

function updateWorkoutSkipCheck(handList) {
  const bothOpen = handList.length === 2 && handList.every((lm) => isOpenPalm(lm));
  if (bothOpen && !prevBothOpen) {
    // Rising edge - skip the current exercise
    clearInterval(exerciseIntervalId);
    exerciseIndex++;
    runCurrentExercise();
  }
  prevBothOpen = bothOpen;
}

function finishWorkout() {
  appState = 'done';
  workoutPanel.style.display = 'none';
  centerMessage.style.display = 'block';
  centerMessage.style.color = '#00FF66';
  centerMessage.style.fontSize = '48px';
  centerMessage.textContent = 'Workout Complete! 🎉';
  statusMsg.textContent = "Reload the page to pick another plan.";
}
</script>
</body>
</html>
